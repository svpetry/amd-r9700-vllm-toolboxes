name: build-rccl

on:
  workflow_dispatch:

jobs:
  build-rccl:
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:43
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          dnf -y install --setopt=install_weak_deps=False --nodocs \
            git cmake ninja-build make gcc gcc-c++ aria2c tar curl unzip \
            libdrm-devel zlib-devel openssl-devel jq
          dnf clean all

      - name: Install ROCm SDK
        run: |
          set -euo pipefail
          BASE="https://therock-nightly-tarball.s3.amazonaws.com"
          PREFIX="therock-dist-linux-gfx120X-all-7"
          KEY="$(curl -s "${BASE}?list-type=2&prefix=${PREFIX}" \
            | tr '<' '\n' \
            | grep -o "therock-dist-linux-gfx120X-all-7\..*\.tar\.gz" \
            | sort -V | tail -n1)"
          echo "Downloading Latest Tarball: ${KEY}"
          aria2c -x 16 -s 16 -j 16 --file-allocation=none "${BASE}/${KEY}" -o therock.tar.gz
          mkdir -p /opt/rocm
          tar xzf therock.tar.gz -C /opt/rocm --strip-components=1
          rm therock.tar.gz

      - name: Build RCCL for gfx1201
        run: |
          export PATH=/opt/rocm/bin:/opt/rocm/llvm/bin:$PATH
          mkdir -p /opt/rccl-custom
          cd /opt/rccl-custom
          git clone --recursive https://github.com/ROCm/rccl.git .
          mkdir -p build && cd build
          CXX=/opt/rocm/bin/hipcc cmake .. \
            -DCMAKE_CXX_COMPILER=/opt/rocm/bin/hipcc \
            -DDEFAULT_GPUS="gfx1201" \
            -DGPU_TARGETS="gfx1201" \
            -DAMDGPU_TARGETS="gfx1201" \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DBUILD_TESTS=OFF \
            -DGENERATE_SYM_KERNELS=OFF \
            -DENABLE_AMDSMI=OFF \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          make install

      - name: Compress Artifact
        run: |
          cd /opt/rccl-custom/build/install/lib
          ls -lh librccl.so.1
          gzip -c librccl.so.1 > /tmp/librccl.so.1.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: librccl-gfx1201
          path: /tmp/librccl.so.1.gz
